<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICC - Reportes de Instalaciones Geográficas</title>
    <link rel="icon" type="image/png" href="Icc.png">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        .leaflet-top, .leaflet-bottom { z-index: 20 !important; }
    </style>
</head>
<body class="bg-slate-50 font-sans h-screen overflow-hidden">

<div id="login-screen" class="flex items-center justify-center h-full">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
        <div class="flex flex-col items-center mb-8">
            <div class="mb-4">
                <img src="Icc.png"
                     alt="Logo ICC"
                     class="w-24 h-24 object-contain rounded-2xl shadow-md border border-slate-100">
            </div>
            <h1 class="text-2xl font-bold text-slate-800">ICC</h1>
            <h3 class="text-base font-semibold text-slate-500 mt-1">Reportes</h3>
            <p class="text-sm text-slate-400 mt-1">Ingresa tus credenciales para continuar</p>
        </div>

        <form id="login-form" onsubmit="login(event)" class="space-y-5">
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Correo Electrónico</label>
                <input type="email" required placeholder="tu@correo.com" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 text-slate-700 bg-slate-50/50">
            </div>
            <div>
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-2">Contraseña</label>
                <input type="password" required placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 text-slate-700 bg-slate-50/50">
            </div>
            <button type="submit" class="w-full py-3.5 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-xl shadow-lg shadow-blue-500/20 transition duration-200 cursor-pointer">
                Iniciar Sesión
            </button>
        </form>
    </div>
</div>

<div id="main-screen" class="hidden h-full w-full flex flex-col relative bg-slate-200">

    <div class="absolute top-0 left-0 right-0 z-30 flex items-center gap-2 p-4 bg-white/95 backdrop-blur-md shadow-md border-b border-slate-200 overflow-visible">

        <button id="btn-tab-mapa" onclick="switchTab('mapa')" class="bg-blue-600 text-white p-3 rounded-xl flex items-center gap-2 font-medium text-sm transition cursor-pointer border border-blue-600">
            <i data-lucide="map" class="w-5 h-5"></i>
            <span>Ver Mapa</span>
        </button>

        <div class="relative inline-block text-left">
            <button id="btn-dropdown-categories" onclick="toggleDropdown()" class="bg-slate-100 hover:bg-slate-200 text-slate-800 p-3 rounded-xl flex items-center gap-2 font-medium text-sm transition cursor-pointer border border-slate-200">
                <i data-lucide="layers" class="w-5 h-5 text-blue-600"></i>
                <span>Categorías</span>
                <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400"></i>
            </button>

            <div id="categories-dropdown" class="hidden absolute left-0 top-full mt-2 w-64 bg-white rounded-2xl shadow-xl border border-slate-100 p-3 space-y-1 z-50">
                <p class="text-[11px] font-bold uppercase tracking-wider text-slate-400 px-3 py-1.5">Instalaciones</p>

                <label class="flex items-center justify-between p-2.5 rounded-xl hover:bg-slate-50 cursor-pointer transition">
                    <div class="flex items-center gap-3">
                        <div class="p-1.5 bg-amber-100 text-amber-700 rounded-lg"><i data-lucide="fence" class="w-4 h-4"></i></div>
                        <span class="text-sm font-medium text-slate-700">Bardas Publicitarias</span>
                    </div>
                    <input type="checkbox" id="filter-barda" checked onchange="updateMapDisplay()" class="w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500">
                </label>

                <label class="flex items-center justify-between p-2.5 rounded-xl hover:bg-slate-50 cursor-pointer transition">
                    <div class="flex items-center gap-3">
                        <div class="p-1.5 bg-blue-100 text-blue-600 rounded-lg"><i data-lucide="image" class="w-4 h-4"></i></div>
                        <span class="text-sm font-medium text-slate-700">Lonas / Anuncios</span>
                    </div>
                    <input type="checkbox" id="filter-lona" checked onchange="updateMapDisplay()" class="w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500">
                </label>

                <label class="flex items-center justify-between p-2.5 rounded-xl hover:bg-slate-50 cursor-pointer transition">
                    <div class="flex items-center gap-3">
                        <div class="p-1.5 bg-purple-100 text-purple-600 rounded-lg"><i data-lucide="grid" class="w-4 h-4"></i></div>
                        <span class="text-sm font-medium text-slate-700">Microperforados</span>
                    </div>
                    <input type="checkbox" id="filter-micro" checked onchange="updateMapDisplay()" class="w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500">
                </label>

                <div class="border-t border-slate-100 my-1"></div>

                <button onclick="logout()" class="w-full flex items-center gap-3 p-2.5 text-left text-sm font-medium text-slate-600 hover:text-red-600 hover:bg-red-50 rounded-xl transition cursor-pointer">
                    <div class="p-1.5 text-slate-400 bg-slate-100 rounded-lg"><i data-lucide="log-out" class="w-4 h-4"></i></div>
                    Salir de la App
                </button>
            </div>
        </div>

        <button id="btn-tab-asambleas" onclick="switchTab('asambleas')" class="bg-slate-100 hover:bg-slate-200 text-slate-800 p-3 rounded-xl flex items-center gap-2 font-medium text-sm transition cursor-pointer border border-slate-200">
            <i data-lucide="users" class="w-5 h-5 text-indigo-600"></i>
            <span>Asambleas</span>
        </button>
    </div>

    <div id="tab-mapa" class="w-full h-full absolute inset-0 z-0">

        <!-- CONTENEDOR DEL MAPA: Aseguramos posición relativa para que el botón no se meta abajo -->
        <div id="map" class="w-full h-full relative z-10"></div>

        <!-- BOTÓN FLOTANTE: Forzamos z-40 y posición fija/absoluta controlada -->
        <button type="button" onclick="toggleModal(true)" class="absolute bottom-6 right-6 p-4 bg-blue-600 hover:bg-blue-700 text-white rounded-full shadow-2xl hover:shadow-blue-500/40 transform hover:scale-105 transition duration-200 flex items-center justify-center cursor-pointer group z-40 select-none">
            <i data-lucide="plus" class="w-6 h-6 group-hover:rotate-90 transition duration-200"></i>
            <span class="max-w-0 overflow-hidden group-hover:max-w-xs group-hover:ml-2 transition-all duration-300 ease-out font-semibold text-sm whitespace-nowrap">
                Agregar Pin
            </span>
        </button>

    </div>

    <div id="tab-asambleas" class="hidden w-full h-full absolute inset-0 z-10 pt-24 pb-6 px-4 bg-slate-100 overflow-y-auto">
        <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-xl border border-slate-200 p-6 mb-12">
            <div class="flex items-center gap-3 border-b border-slate-100 pb-4 mb-6">
                <div class="p-3 bg-indigo-100 text-indigo-700 rounded-xl">
                    <i data-lucide="users" class="w-6 h-6"></i>
                </div>
                <div>
                    <h2 class="text-xl font-bold text-slate-800">Captura de Asambleas</h2>
                    <p class="text-sm text-slate-500">Ingresa los datos correspondientes de los ciudadanos de la reunión.</p>
                </div>
            </div>

            <form id="asamblea-form" onsubmit="saveAsamblea(event)" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Nombre Completo</label>
                    <input type="text" id="asam-nombre" required placeholder="Ej. Juan Pérez López" class="w-full px-4 py-2.5 text-sm rounded-xl border border-slate-200 focus:outline-none focus:border-indigo-500 text-slate-700 bg-slate-50/50">
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Edad</label>
                        <input type="number" id="asam-edad" required min="1" max="120" placeholder="Ej. 35" class="w-full px-4 py-2.5 text-sm rounded-xl border border-slate-200 focus:outline-none focus:border-indigo-500 text-slate-700 bg-slate-50/50">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Teléfono</label>
                        <input type="tel" id="asam-telefono" required placeholder="Ej. 6671234567" class="w-full px-4 py-2.5 text-sm rounded-xl border border-slate-200 focus:outline-none focus:border-indigo-500 text-slate-700 bg-slate-50/50">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Colonia</label>
                    <input type="text" id="asam-colonia" required placeholder="Ej. Centro / Tres Ríos" class="w-full px-4 py-2.5 text-sm rounded-xl border border-slate-200 focus:outline-none focus:border-indigo-500 text-slate-700 bg-slate-50/50">
                </div>

                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">¿Cómo te enteraste de la asamblea?</label>
                    <select id="asam-medio" required onchange="toggleOtroMedio()" class="w-full px-4 py-2.5 text-sm rounded-xl border border-slate-200 focus:outline-none focus:border-indigo-500 text-slate-700 bg-white cursor-pointer">
                        <option value="" disabled selected>Selecciona una opción</option>
                        <option value="Redes Sociales">Redes Sociales (Facebook/WhatsApp)</option>
                        <option value="Volante / Perifoneo">Volante o Perifoneo</option>
                        <option value="Invitación de un vecino">Por invitación de un vecino</option>
                        <option value="Barda / Lona Publicitaria">Vi una barda / lona publicitaria</option>
                        <option value="Otro">Otro medio</option>
                    </select>
                </div>

                <div id="wrapper-otro-medio" class="hidden mt-3">
                    <label class="block text-xs font-semibold uppercase tracking-wider text-indigo-600 mb-1">Especifica el medio</label>
                    <input type="text" id="asam-otro-especificar" placeholder="Ej. Periódico local, evento en plaza, etc." class="w-full px-4 py-2.5 text-sm rounded-xl border border-indigo-200 focus:outline-none focus:border-indigo-500 text-slate-700 bg-indigo-50/30">
                </div>

                <div class="pt-4 border-t border-slate-100 flex justify-end">
                    <button type="submit" class="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-xl shadow-md shadow-indigo-500/10 transition cursor-pointer flex items-center gap-2">
                        <i data-lucide="check" class="w-4 h-4"></i> Registrar Asistente
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<div id="pin-modal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-xs flex items-center justify-center z-50 p-4 overflow-y-auto">
    <div class="bg-white p-6 rounded-2xl shadow-2xl w-full max-w-md border border-slate-100 my-auto">
        <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2 border-b border-slate-100 pb-2">
            <i data-lucide="file-text" class="text-blue-600 w-5 h-5"></i>
            Formato de Reporte: Plantillas Pintadas
        </h3>

        <form onsubmit="savePin(event)" class="grid grid-cols-1 gap-4">
            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1">Domicilio / Referencia</label>
                <textarea id="pin-domicilio" required placeholder="Ej. A 1 CUADRA DE LA CARRETERA SINALOA NAVOLATO - EL CASTILLO" class="w-full px-3 py-2 text-sm rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 text-slate-700 bg-slate-50/50" rows="2"></textarea>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">Colonia / Comunidad</label>
                    <input type="text" id="pin-colonia" required placeholder="Ej. SATAYA CP 80370" class="w-full px-3 py-2 text-sm rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 text-slate-700 bg-slate-50/50">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">Tipo Material</label>
                    <select id="pin-category" class="w-full px-3 py-2 text-sm rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 text-slate-700 bg-white">
                        <option value="Barda">Barda / Plantilla</option>
                        <option value="Lona">Lona</option>
                        <option value="Microperforado">Microperforado</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">Municipio</label>
                    <input type="text" id="pin-municipio" required placeholder="Ej. NAVOLATO, SINALOA" class="w-full px-3 py-2 text-sm rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 text-slate-700 bg-slate-50/50">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">Distrito Local</label>
                    <input type="text" id="pin-distrito" required placeholder="Ej. DISTRITO 10" class="w-full px-3 py-2 text-sm rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 text-slate-700 bg-slate-50/50">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">Fecha de Pintado</label>
                    <input type="date" id="pin-date" required class="w-full px-3 py-2 text-sm rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 text-slate-700 bg-white">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">Evidencia Fotográfica</label>
                    <label class="flex items-center justify-center gap-2 w-full h-10 border border-dashed border-slate-300 rounded-xl cursor-pointer hover:bg-slate-50 hover:border-blue-400 transition px-2 group">
                        <i data-lucide="camera" class="w-4 h-4 text-slate-400 group-hover:text-blue-500 transition"></i>
                        <p id="upload-text" class="text-[11px] text-slate-500 font-medium truncate">Tomar foto</p>
                        <input id="pin-image" type="file" accept="image/*" capture="environment" class="hidden" onchange="handleImageSelection(this)">
                    </label>
                </div>
            </div>

            <div class="bg-slate-50/80 p-3.5 rounded-xl border border-slate-100 space-y-2">
                <div class="flex items-center justify-between">
                    <span class="text-xs font-bold text-slate-600 uppercase tracking-wide">Ubicación Geográfica</span>
                    <button type="button" onclick="getCurrentLocation()" class="text-[11px] flex items-center gap-1 text-blue-600 font-bold hover:text-blue-700 transition bg-blue-50 px-2.5 py-1 rounded-lg border border-blue-100 cursor-pointer">
                        <i data-lucide="locate" class="w-3 h-3"></i> GPS
                    </button>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="pin-lat" required placeholder="Latitud" class="w-full px-3 py-2 text-xs rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 text-slate-700 bg-white">
                    <input type="text" id="pin-lng" required placeholder="Longitud" class="w-full px-3 py-2 text-xs rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 text-slate-700 bg-white">
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1">Observaciones</label>
                <input type="text" id="pin-notes" placeholder="Ej. Detalle de pintura, barda limpia..." class="w-full px-3 py-2 text-sm rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 text-slate-700 bg-slate-50/50">
            </div>

            <div class="flex gap-3 pt-2 border-t border-slate-100 mt-1">
                <button type="button" onclick="toggleModal(false)" class="flex-1 h-10 text-sm font-medium text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-xl transition cursor-pointer text-center">
                    Cancelar
                </button>
                <button type="submit" class="flex-1 h-10 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-xl transition shadow-md shadow-blue-500/10 cursor-pointer text-center">
                    Guardar Reporte
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    let map;
    let savedPins = JSON.parse(localStorage.getItem('icc_pins')) || [];
    let savedAsambleas = JSON.parse(localStorage.getItem('icc_asambleas')) || [];
    let currentBase64Image = "";
    let markerLayerGroup;

    lucide.createIcons();

    function switchTab(tab) {
        document.getElementById('categories-dropdown').classList.add('hidden');

        const btnMapa = document.getElementById('btn-tab-mapa');
        const btnAsambleas = document.getElementById('btn-tab-asambleas');
        const btnDropdown = document.getElementById('btn-dropdown-categories');

        if (tab === 'asambleas') {
            document.getElementById('tab-mapa').classList.add('hidden');
            document.getElementById('tab-asambleas').classList.remove('hidden');
            btnAsambleas.className = "bg-indigo-600 text-white p-3 rounded-xl flex items-center gap-2 font-medium text-sm transition cursor-pointer border border-indigo-600";
            btnMapa.className = "bg-slate-100 hover:bg-slate-200 text-slate-800 p-3 rounded-xl flex items-center gap-2 font-medium text-sm transition cursor-pointer border border-slate-200";
            btnDropdown.classList.add('opacity-40', 'pointer-events-none');
        } else {
            document.getElementById('tab-asambleas').classList.add('hidden');
            document.getElementById('tab-mapa').classList.remove('hidden');
            btnMapa.className = "bg-blue-600 text-white p-3 rounded-xl flex items-center gap-2 font-medium text-sm transition cursor-pointer border border-blue-600";
            btnAsambleas.className = "bg-slate-100 hover:bg-slate-200 text-slate-800 p-3 rounded-xl flex items-center gap-2 font-medium text-sm transition cursor-pointer border border-slate-200";
            btnDropdown.classList.remove('opacity-40', 'pointer-events-none');
            if (map) { setTimeout(() => { map.invalidateSize(); }, 50); }
        }
    }

    function toggleDropdown() {
        document.getElementById('categories-dropdown').classList.toggle('hidden');
    }

    function login(event) {
        event.preventDefault();
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('main-screen').classList.remove('hidden');
        document.getElementById('categories-dropdown').classList.add('hidden');

        // Inicializamos el mapa justo AQUÍ, cuando el contenedor ya es visible en pantalla
        initMap();
        updateMapDisplay();
    }

    function logout() {
        document.getElementById('main-screen').classList.add('hidden');
        document.getElementById('login-screen').classList.remove('hidden');
        switchTab('mapa');
    }

    function toggleModal(show) {
        const modal = document.getElementById('pin-modal');
        if (show) {
            modal.classList.remove('hidden');
            document.getElementById('categories-dropdown').classList.add('hidden');
            document.getElementById('pin-date').value = new Date().toISOString().split('T')[0];
        } else {
            modal.classList.add('hidden');
            document.getElementById('pin-domicilio').value = '';
            document.getElementById('pin-colonia').value = '';
            document.getElementById('pin-municipio').value = '';
            document.getElementById('pin-distrito').value = '';
            document.getElementById('pin-notes').value = '';
            document.getElementById('pin-lat').value = '';
            document.getElementById('pin-lng').value = '';
            document.getElementById('pin-image').value = '';
            document.getElementById('upload-text').innerText = "Tomar foto";
            document.getElementById('upload-text').className = "text-[11px] text-slate-500 font-medium truncate";
            currentBase64Image = "";
        }
    }

    function handleImageSelection(input) {
        const file = input.files[0];
        if (file) {
            if (file.size > 2 * 1024 * 1024) {
                alert("La foto es demasiado pesada. Elige una menor a 2MB.");
                input.value = '';
                return;
            }
            const reader = new FileReader();
            reader.onload = function(e) {
                currentBase64Image = e.target.result;
                const textIndicator = document.getElementById('upload-text');
                textIndicator.innerText = "¡Foto cargada con éxito! ✓";
                textIndicator.className = "text-xs text-emerald-600 font-bold truncate";
            };
            reader.readAsDataURL(file);
        }
    }

    function getCurrentLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    document.getElementById('pin-lat').value = position.coords.latitude.toFixed(6);
                    document.getElementById('pin-lng').value = position.coords.longitude.toFixed(6);
                },
                () => { alert("No se pudo obtener el acceso a tu GPS."); }
            );
        } else {
            alert("Navegador no compatible con geolocalización.");
        }
    }

    function initMap() {
        if (!map) {
            // Añadimos una pequeña validación para asegurarnos de que el div exista antes de montar Leaflet
            const mapContainer = document.getElementById('map');
            if (!mapContainer) return;

            map = L.map('map', { minZoom: 9, maxZoom: 19 }).setView([24.8050, -107.3940], 11);
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: 'Tiles &copy; Esri &mdash; Source: Esri'
            }).addTo(map);
            markerLayerGroup = L.featureGroup().addTo(map);
            map.on('zoomend', function() { updateMapDisplay(); });
        }
        setTimeout(() => { map.invalidateSize(); }, 200);
    }

    function updateMapDisplay() {
        if (!map || !markerLayerGroup) return;
        markerLayerGroup.clearLayers();

        const showBarda = document.getElementById('filter-barda').checked;
        const showLona = document.getElementById('filter-lona').checked;
        const showMicro = document.getElementById('filter-micro').checked;

        const filteredPins = savedPins.filter(pin => {
            const lat = parseFloat(pin.lat);
            const lng = parseFloat(pin.lng);
            if (isNaN(lat) || isNaN(lng)) return false;
            if (pin.category === 'Barda' && !showBarda) return false;
            if (pin.category === 'Lona' && !showLona) return false;
            if (pin.category === 'Microperforado' && !showMicro) return false;
            return true;
        });

        if (filteredPins.length === 0) return;
        const currentZoom = map.getZoom();

        if (currentZoom <= 9) {
            let totalLat = 0, totalLng = 0;
            filteredPins.forEach(p => { totalLat += parseFloat(p.lat); totalLng += parseFloat(p.lng); });
            const avgLat = totalLat / filteredPins.length;
            const avgLng = totalLng / filteredPins.length;

            const clusterHtml = `
                <div class="flex items-center justify-center w-16 h-16 rounded-full bg-indigo-700 text-white font-black text-xl border-4 border-white shadow-2xl cursor-pointer ring-4 ring-indigo-500/30">
                    ${filteredPins.length}
                </div>`;
            const clusterIcon = L.divIcon({ html: clusterHtml, className: 'custom-absolute-cluster', iconSize: [64, 64], iconAnchor: [32, 32] });
            const clusterMarker = L.marker([avgLat, avgLng], { icon: clusterIcon });
            clusterMarker.on('click', () => { map.setView([avgLat, avgLng], 10); });
            markerLayerGroup.addLayer(clusterMarker);
        }
        else if (currentZoom === 10) {
            const clusters = [];
            const distanceThreshold = 0.3;

            filteredPins.forEach(pin => {
                let addedToCluster = false;
                for (let i = 0; i < clusters.length; i++) {
                    const c = clusters[i];
                    const centerLat = c.latSum / c.count;
                    const centerLng = c.lngSum / c.count;
                    const dist = Math.sqrt(Math.pow(pin.lat - centerLat, 2) + Math.pow(pin.lng - centerLng, 2));
                    if (dist < distanceThreshold) {
                        c.count++; c.latSum += parseFloat(pin.lat); c.lngSum += parseFloat(pin.lng); addedToCluster = true; break;
                    }
                }
                if (!addedToCluster) { clusters.push({ count: 1, latSum: parseFloat(pin.lat), lngSum: parseFloat(pin.lng) }); }
            });

            clusters.forEach(c => {
                const avgLat = c.latSum / c.count; const avgLng = c.lngSum / c.count;
                const clusterHtml = `
                    <div class="flex items-center justify-center w-14 h-14 rounded-full bg-blue-600 text-white font-bold text-lg border-4 border-white shadow-xl cursor-pointer">
                        ${c.count}
                    </div>`;
                const clusterIcon = L.divIcon({ html: clusterHtml, className: 'custom-regional-cluster', iconSize: [56, 56], iconAnchor: [28, 28] });
                const clusterMarker = L.marker([avgLat, avgLng], { icon: clusterIcon });
                clusterMarker.on('click', () => { map.setView([avgLat, avgLng], 12); });
                markerLayerGroup.addLayer(clusterMarker);
            });
        }
        else if (currentZoom <= 12) {
            const zones = {};
            const gridFactor = (currentZoom === 11) ? 25 : 45;

            filteredPins.forEach(pin => {
                const latGrid = Math.round(pin.lat * gridFactor) / gridFactor;
                const lngGrid = Math.round(pin.lng * gridFactor) / gridFactor;
                const zoneKey = `${latGrid}_${lngGrid}`;
                if (!zones[zoneKey]) { zones[zoneKey] = { count: 0, latSum: 0, lngSum: 0 }; }
                zones[zoneKey].count++; zones[zoneKey].latSum += parseFloat(pin.lat); zones[zoneKey].lngSum += parseFloat(pin.lng);
            });

            Object.keys(zones).forEach(key => {
                const zone = zones[key]; const avgLat = zone.latSum / zone.count; const avgLng = zone.lngSum / zone.count;
                const clusterHtml = `
                    <div class="flex items-center justify-center w-12 h-12 rounded-full bg-sky-500 text-white font-bold text-base border-2 border-white shadow-lg cursor-pointer">
                        ${zone.count}
                    </div>`;
                const clusterIcon = L.divIcon({ html: clusterHtml, className: 'custom-zone-cluster', iconSize: [48, 48], iconAnchor: [24, 24] });
                const clusterMarker = L.marker([avgLat, avgLng], { icon: clusterIcon });
                clusterMarker.on('click', () => { map.setView([avgLat, avgLng], 14); });
                markerLayerGroup.addLayer(clusterMarker);
            });
        }
        else {
            filteredPins.forEach(pin => {
                let iconMarkup = '<div class="p-2 bg-blue-600 text-white rounded-full shadow-lg border-2 border-white flex items-center justify-center w-8 h-8"><i data-lucide="image" class="w-4 h-4"></i></div>';
                if (pin.category === 'Barda') {
                    iconMarkup = '<div class="p-2 bg-amber-600 text-white rounded-full shadow-lg border-2 border-white flex items-center justify-center w-9 h-9"><i data-lucide="fence" class="w-5 h-5"></i></div>';
                } else if (pin.category === 'Microperforado') {
                    iconMarkup = '<div class="p-2 bg-purple-600 text-white rounded-full shadow-lg border-2 border-white flex items-center justify-center w-8 h-8"><i data-lucide="grid" class="w-4 h-4"></i></div>';
                }

                const customIcon = L.divIcon({ html: iconMarkup, className: 'custom-leaflet-icon', iconSize: [36, 36], iconAnchor: [18, 18] });
                let imageMarkup = pin.image ? `<img src="${pin.image}" class="w-full h-28 object-cover rounded-lg mt-2 mb-1 shadow-xs border border-slate-100">` : "";

                const popupContent = `
    <div class="font-sans min-w-[220px] max-w-[250px] p-0.5">
        <p class="text-[9px] font-bold text-blue-600 uppercase tracking-wider m-0">${pin.category} | ${pin.distrito}</p>
        <p class="text-xs font-bold text-slate-800 m-0">${pin.domicilio}</p>
        <p class="text-[11px] text-slate-500 mt-0.5 mb-1">📍 ${pin.colonia}, ${pin.municipio}</p>
        ${imageMarkup}
        <p class="text-[11px] text-slate-600 m-0 mt-1">📅 Pintado: <b>${pin.date}</b></p>
        <p class="text-[10px] font-mono text-slate-400 mt-0.5 mb-1">📌 ${parseFloat(pin.lat).toFixed(5)}, ${parseFloat(pin.lng).toFixed(5)}</p>
        <p class="text-[11px] text-slate-600 italic mt-1 bg-slate-50 p-1.5 rounded border border-slate-100">"${pin.notes}"</p>
    </div>`;

                const marker = L.marker([parseFloat(pin.lat), parseFloat(pin.lng)], { icon: customIcon });
                marker.bindPopup(popupContent);
                markerLayerGroup.addLayer(marker);
            });
        }
        lucide.createIcons();
    }

    function savePin(event) {
        event.preventDefault();
        const latVal = document.getElementById('pin-lat').value.trim();
        const lngVal = document.getElementById('pin-lng').value.trim();
        const lat = parseFloat(latVal);
        const lng = parseFloat(lngVal);

        if (isNaN(lat) || isNaN(lng)) { alert("Por favor ingresa coordenadas válidas."); return; }

        // Mapeo estructurado idéntico a las columnas de tu .xlsx
        const newPin = {
            domicilio: document.getElementById('pin-domicilio').value.trim(),
            colonia: document.getElementById('pin-colonia').value.trim(),
            municipio: document.getElementById('pin-municipio').value.trim(),
            distrito: document.getElementById('pin-distrito').value.trim(),
            category: document.getElementById('pin-category').value, // Para filtros visuales del mapa
            date: document.getElementById('pin-date').value, // Fecha pintado
            notes: document.getElementById('pin-notes').value.trim() || "Sin observaciones",
            lat: lat,
            lng: lng,
            image: currentBase64Image
        };

        savedPins.push(newPin);
        try {
            localStorage.setItem('icc_pins', JSON.stringify(savedPins));
        } catch (e) {
            alert("Error de espacio: la foto es demasiado pesada para el almacenamiento local temporal.");
            savedPins.pop();
            return;
        }

        toggleModal(false);
        updateMapDisplay();
        map.panTo([newPin.lat, newPin.lng]);
    }

    function toggleOtroMedio() {
        const medioSelect = document.getElementById('asam-medio');
        const wrapperOtro = document.getElementById('wrapper-otro-medio');
        const inputEspecificar = document.getElementById('asam-otro-especificar');

        if (medioSelect.value === 'Otro') {
            wrapperOtro.classList.remove('hidden'); inputEspecificar.setAttribute('required', 'required');
        } else {
            wrapperOtro.classList.add('hidden'); inputEspecificar.removeAttribute('required'); inputEspecificar.value = '';
        }
    }

    function saveAsamblea(event) {
        event.preventDefault();
        const medioSeleccionado = document.getElementById('asam-medio').value;
        const especificarValor = document.getElementById('asam-otro-especificar').value.trim();
        const medioFinal = (medioSeleccionado === 'Otro') ? especificarValor : medioSeleccionado;

        const nuevaAsamblea = {
            nombre: document.getElementById('asam-nombre').value.trim(),
            edad: parseInt(document.getElementById('asam-edad').value),
            telefono: document.getElementById('asam-telefono').value.trim(),
            colonia: document.getElementById('asam-colonia').value.trim(),
            medio: medioFinal, fechaRegistro: new Date().toLocaleString()
        };

        savedAsambleas.push(nuevaAsamblea);
        localStorage.setItem('icc_asambleas', JSON.stringify(savedAsambleas));
        alert("✓ Asistente registrado exitosamente.");
        document.getElementById('asamblea-form').reset();
        toggleOtroMedio();
    }
</script>
